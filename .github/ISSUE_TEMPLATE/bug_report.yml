name: Bug report
description: Something is wrong or crashed
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: What did you do, what did you expect, what happened instead?
      placeholder: I opened a melodic dictation exercise, pressed Play, and...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App version
      description: Shown on the About screen (or the release you downloaded).
      placeholder: 1.0.0
    validations:
      required: true
  - type: dropdown
    id: install
    attributes:
      label: How are you running it?
      options:
        - Installer (MusicTheoryMaster-Setup.exe)
        - Portable exe (MusicTheoryMaster.exe)
        - From source (python main.py)
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: Windows 11 23H2
  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Screenshots, the exercise type involved, MIDI device, etc.
