name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    name: tests (${{ matrix.os }}, py${{ matrix.python }})
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        python: ["3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install Qt/audio system libraries (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon0 libxcb-cursor0 libdbus-1-3 \
            libfontconfig1 libportaudio2 libpulse0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run test suite (headless GUI)
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m pytest tests -q

  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install ruff==0.14.4
      # Errors only (syntax, undefined names, obvious bugs); style is not gated.
      - run: ruff check --select E9,F63,F7,F82,F401,F811 music_theory tests build main.py
